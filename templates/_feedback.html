<!-- ── Floating feedback button + modal (shared partial) ────────────────── -->
<button type="button" class="feedback-fab" id="fbOpenBtn" aria-haspopup="dialog"
        aria-controls="feedbackModal">
    &#128172; Feedback
</button>

<div class="feedback-overlay" id="feedbackModal" role="dialog" aria-modal="true"
     aria-labelledby="fbTitle" hidden>
    <div class="feedback-modal">
        <div class="feedback-header">
            <h2 id="fbTitle">Share Feedback</h2>
            <button type="button" class="feedback-close" id="fbCloseBtn"
                    aria-label="Close">&times;</button>
        </div>

        <div class="feedback-body" id="fbFormWrap">
            <p class="feedback-hint">
                Found a bug or have an idea for the site? It goes straight onto our
                to-do list. Everything else lands in Richard's inbox.
            </p>
            <div class="feedback-field feedback-field-row">
                <span>
                    <label for="fbName">Name <small>(optional)</small></label>
                    <input type="text" id="fbName" maxlength="100" autocomplete="name"
                           placeholder="Jane from Startzville">
                </span>
                <span>
                    <label for="fbEmail">Email <small>(optional)</small></label>
                    <input type="email" id="fbEmail" maxlength="200" autocomplete="email"
                           placeholder="jane@example.com">
                </span>
            </div>
            <!-- Honeypot: hidden from humans; bots that fill it get quietly ignored -->
            <div class="feedback-hp" aria-hidden="true">
                <label for="fbWebsite">Website</label>
                <input type="text" id="fbWebsite" tabindex="-1" autocomplete="off">
            </div>
            <div class="feedback-field">
                <label for="fbText">Your feedback</label>
                <textarea id="fbText" rows="5" maxlength="4000" required
                          placeholder="Describe a bug, suggest an improvement, or just say howdy&hellip;"></textarea>
                <div class="feedback-count"><span id="fbCharCount">0</span> / 4000</div>
            </div>
            <div class="feedback-error" id="fbError" hidden></div>
        </div>

        <div class="feedback-success" id="fbSuccess" hidden>
            <div class="feedback-success-icon">&#10003;</div>
            <p id="fbSuccessMsg"></p>
        </div>

        <div class="feedback-footer" id="fbFooter">
            <button type="button" class="feedback-btn-secondary" id="fbCancelBtn">Cancel</button>
            <button type="button" class="feedback-btn-primary" id="fbSendBtn">
                <span id="fbBtnLabel">Send</span>
                <span id="fbBtnSpinner" hidden>Sending&hellip;</span>
            </button>
        </div>
    </div>
</div>

<script>
(function () {
    const overlay  = document.getElementById('feedbackModal');
    const openBtn  = document.getElementById('fbOpenBtn');
    const textEl   = document.getElementById('fbText');
    const countEl  = document.getElementById('fbCharCount');
    const errorEl  = document.getElementById('fbError');
    const sendBtn  = document.getElementById('fbSendBtn');

    function openModal() {
        overlay.hidden = false;
        document.body.style.overflow = 'hidden';
        textEl.focus();
    }

    function closeModal() {
        overlay.hidden = true;
        document.body.style.overflow = '';
    }

    openBtn.addEventListener('click', openModal);
    document.getElementById('fbCloseBtn').addEventListener('click', closeModal);
    document.getElementById('fbCancelBtn').addEventListener('click', closeModal);
    overlay.addEventListener('click', function (e) {
        if (e.target === overlay) closeModal();
    });
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && !overlay.hidden) closeModal();
    });

    textEl.addEventListener('input', function () {
        countEl.textContent = textEl.value.length;
    });

    function showError(msg) {
        errorEl.textContent = msg;
        errorEl.hidden = false;
    }

    async function submitFeedback() {
        errorEl.hidden = true;
        const text = textEl.value.trim();
        if (text.length < 10) {
            showError('Please describe your feedback (at least 10 characters).');
            return;
        }

        sendBtn.disabled = true;
        document.getElementById('fbBtnLabel').hidden = true;
        document.getElementById('fbBtnSpinner').hidden = false;

        const form = new FormData();
        form.append('feedback_text', text);
        form.append('name',  document.getElementById('fbName').value.trim());
        form.append('email', document.getElementById('fbEmail').value.trim());
        form.append('website', document.getElementById('fbWebsite').value);
        form.append('page', window.location.pathname);

        let data;
        try {
            const resp = await fetch('/api/feedback', { method: 'POST', body: form });
            data = await resp.json();
        } catch (err) {
            data = { ok: false, error: 'Could not reach the server. Please try again.' };
        }

        sendBtn.disabled = false;
        document.getElementById('fbBtnLabel').hidden = false;
        document.getElementById('fbBtnSpinner').hidden = true;

        if (!data.ok) {
            showError(data.error || 'Something went wrong. Please try again.');
            return;
        }

        const msgEl = document.getElementById('fbSuccessMsg');
        if (data.action === 'github_issue' && data.github_url) {
            msgEl.innerHTML = 'Thank you! Your suggestion is now on our to-do list &mdash; ' +
                '<a href="' + data.github_url + '" target="_blank" rel="noopener noreferrer">track it here</a>.';
        } else if (data.action === 'github_issue') {
            msgEl.textContent = 'Thank you! Your suggestion is now on our to-do list.';
        } else {
            msgEl.textContent = 'Thank you! Your feedback is on its way to Richard.';
        }
        document.getElementById('fbFormWrap').hidden = true;
        document.getElementById('fbFooter').hidden = true;
        document.getElementById('fbSuccess').hidden = false;

        setTimeout(function () {
            closeModal();
            document.getElementById('fbFormWrap').hidden = false;
            document.getElementById('fbFooter').hidden = false;
            document.getElementById('fbSuccess').hidden = true;
            textEl.value = '';
            countEl.textContent = '0';
        }, 6000);
    }

    sendBtn.addEventListener('click', submitFeedback);
})();
</script>
